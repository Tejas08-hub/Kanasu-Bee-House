<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | Kanasu Bee House</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<style>
:root{
--primary:#f4b400;
--primary-dark:#d39e00;
--bg:#fffcf0;
--glass:rgba(255,255,255,.85);
--shadow:0 20px 60px rgba(0,0,0,.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:linear-gradient(135deg,#fffdf4,#fff6d6);
color:#2d3436;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 25px;
background:white;
box-shadow:0 4px 15px rgba(0,0,0,.05);
}

.back{
font-weight:600;
cursor:pointer;
transition:.2s;
}
.back:hover{
color:var(--primary);
}

.brand{
font-size:20px;
font-weight:800;
}
.brand span{
color:var(--primary);
}

/* LAYOUT */
.container{
max-width:1100px;
margin:60px auto;
padding:0 20px;
display:grid;
grid-template-columns:1fr 2fr;
gap:40px;
}

@media(max-width:768px){
.container{
grid-template-columns:1fr;
margin:30px auto;
}
}

/* CARD */
.card{
background:var(--glass);
backdrop-filter:blur(10px);
border-radius:25px;
padding:35px;
box-shadow:var(--shadow);
transition:.3s;
}

.card:hover{
transform:translateY(-4px);
}

/* PROFILE IMAGE */
.profile-box{
text-align:center;
}

.profile-img{
width:170px;
height:170px;
border-radius:50%;
object-fit:cover;
border:5px solid var(--primary);
cursor:pointer;
transition:.3s;
}

.profile-img:hover{
box-shadow:0 0 25px rgba(244,180,0,.5);
transform:scale(1.05);
}

.upload-btn{
margin-top:15px;
font-size:14px;
color:var(--primary);
cursor:pointer;
font-weight:700;
transition:.2s;
}

.upload-btn:hover{
color:var(--primary-dark);
}

.profile-name{
margin-top:18px;
font-size:22px;
font-weight:700;
}

.profile-email{
font-size:14px;
color:#666;
margin-top:4px;
}

/* FORM */
.form-group{
margin-bottom:18px;
}

label{
font-size:14px;
font-weight:600;
display:block;
margin-bottom:6px;
}

input,select,textarea{
width:100%;
padding:12px 14px;
border-radius:14px;
border:1px solid #ddd;
font-size:14px;
transition:.2s;
}

input:focus,select:focus,textarea:focus{
outline:none;
border-color:var(--primary);
box-shadow:0 0 0 3px rgba(244,180,0,.2);
}

button{
width:100%;
padding:13px;
background:var(--primary);
color:white;
border:none;
border-radius:14px;
font-weight:700;
cursor:pointer;
margin-top:10px;
transition:.3s;
}

button:hover{
background:var(--primary-dark);
transform:translateY(-2px);
}

.section-title{
font-size:18px;
font-weight:700;
margin-bottom:15px;
}

@media(max-width:600px){
.profile-img{
width:150px;
height:150px;
}
.card{
padding:25px;
}
}
</style>
</head>

<body>

<div class="topbar">
<div class="back" onclick="goBack()">← Back</div>
<div class="brand">
<span style="color:black;">Kanasu </span>
<span>Bee House</span>
</div>
</div>

<div class="container">

<!-- LEFT SIDE -->
<div class="card profile-box">

<img id="profileDisplay" class="profile-img" src="https://via.placeholder.com/170">

<input type="file" id="imgUpload" accept="image/*" style="display:none;">

<div class="upload-btn" onclick="document.getElementById('imgUpload').click()">
Add / Change Profile Picture
</div>

<div class="profile-name" id="displayName">Loading...</div>
<div class="profile-email" id="displayEmail"></div>

</div>

<!-- RIGHT SIDE -->
<div>

<div class="card">
<div class="section-title">Beekeeper Information</div>

<div class="form-group">
<label>Honey Type</label>
<select id="honeyType">
<option>Wild Honey</option>
<option>Forest Honey</option>
<option>Organic Honey</option>
<option>Monofloral</option>
</select>
</div>

<div class="form-group">
<label>Total Revenue (₹)</label>
<input type="text" id="revenue">
</div>

<div class="form-group">
<label>Total Hives</label>
<input type="number" id="hives">
</div>

<div class="form-group">
<label>Location</label>
<input type="text" id="location">
</div>

<button onclick="updateProfile()">Save Information</button>
</div>

<div class="card">
<div class="section-title">Current Activity</div>
<textarea id="activity" rows="4"></textarea>
<button onclick="saveActivity()">Save Activity</button>
</div>

</div>

</div>

<script>
const auth = firebase.auth();
const db = firebase.database();
let currentUser = null;

/* AUTH */
auth.onAuthStateChanged(user=>{
if(!user){
window.location.href="index.html";
}else{
currentUser=user;
displayEmail.innerText=user.email;
loadUserData(user.uid);
}
});

/* LOAD DATA */
function loadUserData(uid){
db.ref("users/"+uid).on("value",snap=>{
const data=snap.val();
if(data){
displayName.innerText=data.name || "Beekeeper";
honeyType.value=data.honeyType || "";
revenue.value=data.totalRevenue || "";
hives.value=data.totalHives || "";
location.value=data.location || "";
activity.value=data.activity || "";

if(data.profileImageBase64){
profileDisplay.src=data.profileImageBase64;
}
}
});
}

/* UPDATE PROFILE */
async function updateProfile(){
await db.ref("users/"+currentUser.uid).update({
honeyType:honeyType.value,
totalRevenue:revenue.value,
totalHives:hives.value,
location:location.value
});
alert("Profile Updated 🐝");
}

/* SAVE ACTIVITY */
async function saveActivity(){
await db.ref("users/"+currentUser.uid).update({
activity:activity.value
});
alert("Activity Saved");
}

/* IMAGE BASE64 */
document.getElementById("imgUpload").addEventListener("change", function(e){

const file = e.target.files[0];
if(!file) return;

const reader = new FileReader();

reader.onloadend = function(){
const base64String = reader.result;

db.ref("users/"+currentUser.uid).update({
profileImageBase64:base64String
}).then(()=>{
profileDisplay.src=base64String;
alert("Profile Image Updated 🎉");
});
};

reader.readAsDataURL(file);
});

/* BACK */
function goBack(){
window.location.href="welcome.html";
}
</script>

</body>
</html>
